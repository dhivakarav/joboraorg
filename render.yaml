# Render Blueprint — provisions the full Jobora stack.
# Deploy: push to GitHub, then Render Dashboard → New → Blueprint → pick this repo.
# Docs: https://render.com/docs/blueprint-spec
#
# PLAN UPGRADE GUIDE (free → production)
# The free tier is suitable for development and closed beta only.
# For public / production deployments change EACH plan as follows:
#
#   jobara-db    free → starter ($7/mo) or higher for persistence + backups
#   jobara-redis free → starter ($10/mo) for always-on, no eviction risk
#   jobara-api   free → starter ($7/mo) REQUIRED for always-on (no cold starts)
#
# The free-tier API service SPINS DOWN after ~15 minutes of inactivity.
# The first request after a spin-down waits ~30s for the container to start.
# This is unacceptable for a production job-application platform where users
# expect real-time search results and immediate apply confirmation.
#
# To upgrade: edit the plan: fields below and re-deploy the Blueprint in Render.
databases:
  - name: jobara-db
    databaseName: jobara
    plan: free          # PRODUCTION: change to starter or higher
    postgresMajorVersion: "16"

services:
  # --- Redis (managed key-value) ---
  - type: keyvalue
    name: jobara-redis
    plan: free          # PRODUCTION: change to starter (always-on, no cold start)
    ipAllowList: []     # only accessible from Render services
    maxmemoryPolicy: allkeys-lru

  # --- FastAPI backend ---
  - type: web
    name: jobara-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free          # PRODUCTION: MUST change to starter+ — free tier spins down
                        # after ~15 min idle causing 30s cold starts on first request.
    healthCheckPath: /api/health
    # entrypoint.sh runs `alembic upgrade head` before uvicorn, so migrations
    # apply on every deploy automatically.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobara-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: jobara-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: CREDENTIAL_KEY
        sync: false                  # set manually (must be a Fernet key)
      - key: CORS_ORIGINS
        sync: false                  # set to your static site URL
      - key: APP_BASE_URL
        sync: false
      # Admin bootstrap — env-only, NEVER committed. Without both, no admin is
      # seeded (startup logs a notice). Set these in the Render dashboard.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: EXPOSE_RESET_TOKEN
        value: "0"
      - key: LOG_LEVEL
        value: INFO
      # SMTP_* and provider keys: add in the dashboard as needed.

  # --- React SPA (static site, built by Vite) ---
  - type: web
    name: jobara-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false                  # set to https://jobara-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html     # SPA fallback
