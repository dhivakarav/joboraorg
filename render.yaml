# Render Blueprint — provisions the full Jobora stack.
# Deploy: push to GitHub, then Render Dashboard → New → Blueprint → pick this repo.
# Docs: https://render.com/docs/blueprint-spec
#
# PLAN UPGRADE GUIDE (free → production)
# The free tier is suitable for development and closed beta only.
# For public / production deployments change EACH plan as follows:
#
#   jobara-db    free → starter ($7/mo) or higher for persistence + backups
#   jobara-redis free → starter ($10/mo) for always-on, no eviction risk
#   jobara-api   free → starter ($7/mo) REQUIRED for always-on (no cold starts)
#
# The free-tier API service SPINS DOWN after ~15 minutes of inactivity.
# The first request after a spin-down waits ~30s for the container to start.
# This is unacceptable for a production job-application platform where users
# expect real-time search results and immediate apply confirmation.
#
# To upgrade: edit the plan: fields below and re-deploy the Blueprint in Render.
databases:
  - name: jobara-db
    databaseName: jobara
    plan: free          # PRODUCTION: change to starter or higher
    postgresMajorVersion: "16"

services:
  # --- Redis (managed key-value) ---
  - type: keyvalue
    name: jobara-redis
    plan: free          # PRODUCTION: change to starter (always-on, no cold start)
    ipAllowList: []     # only accessible from Render services
    maxmemoryPolicy: allkeys-lru

  # --- FastAPI backend ---
  - type: web
    name: jobara-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free          # PRODUCTION: MUST change to starter+ — free tier spins down
                        # after ~15 min idle causing 30s cold starts on first request.
    healthCheckPath: /api/health
    # entrypoint.sh runs `alembic upgrade head` before uvicorn, so migrations
    # apply on every deploy automatically.
    #
    # LIVE MODE (auto-submission of real job applications):
    # Controlled by two independent guards that BOTH must be satisfied:
    #
    #   Guard 1 — JOBORA_LIVE=1 (env var below, default 0/off)
    #     Set to "1" to enable live submission. The Dockerfile exposes this as the
    #     INSTALL_BROWSERS build arg — if browsers aren't in the image, live mode
    #     returns "Playwright Chromium is not installed" even when this is "1".
    #
    #   Guard 2 — Chromium installed in the Docker image (build arg below)
    #     The Dockerfile only runs `playwright install --with-deps chromium` when
    #     INSTALL_BROWSERS=1. This roughly doubles the image size (~900MB) and pulls
    #     system font/audio packages — acceptable for live mode, not for API-only.
    #
    # To enable live mode, set BOTH: JOBORA_LIVE=1 AND buildArgs INSTALL_BROWSERS=1,
    # then trigger a new deploy. The banner "Live mode is OFF" disappears when both
    # guards pass (live_ready() returns True).
    #
    # LIVE MODE: Chromium is installed unconditionally in the Dockerfile (ARG default=1).
    # Render's Blueprint spec does not support passing Docker build arguments —
    # dockerBuildArgs is not a recognised field and is silently ignored, so the
    # previous conditional ARG INSTALL_BROWSERS=0 approach never worked on Render.
    # The Dockerfile default was changed to ARG INSTALL_BROWSERS=1 so every Render
    # build includes Chromium. CI overrides this with --build-arg INSTALL_BROWSERS=0.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobara-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: jobara-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong secret
      - key: CREDENTIAL_KEY
        sync: false                  # set manually (must be a Fernet key)
      - key: CORS_ORIGINS
        sync: false                  # set to your static site URL
      - key: APP_BASE_URL
        sync: false
      # Admin bootstrap — env-only, NEVER committed. Without both, no admin is
      # seeded (startup logs a notice). Set these in the Render dashboard.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: EXPOSE_RESET_TOKEN
        value: "0"
      - key: LOG_LEVEL
        value: INFO
      # LIVE MODE env var — paired with INSTALL_BROWSERS=1 build arg above.
      - key: JOBORA_LIVE
        value: "1"
      # SMTP_* and provider keys: add in the dashboard as needed.

  # --- React SPA (static site, built by Vite) ---
  - type: web
    name: jobara-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false                  # set to https://jobara-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html     # SPA fallback
