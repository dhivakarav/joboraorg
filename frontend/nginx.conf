server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---------------------------------------------------
    # Prevent clickjacking: never load inside an iframe.
    add_header X-Frame-Options "DENY" always;
    # Stop browsers from MIME-sniffing a response away from the declared type.
    add_header X-Content-Type-Options "nosniff" always;
    # Force HTTPS for 1 year when served behind a TLS-terminating proxy.
    # (No-op on plain HTTP, but harmless and required by HSTS preload lists.)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Referrer policy: send the full URL within the same origin, nothing cross-origin.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions policy: opt out of sensitive browser APIs not used by the app.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # Content-Security-Policy:
    #   - default-src 'self'           → only same-origin by default
    #   - script-src 'self' 'unsafe-inline' → Vite bundles inline scripts (hash-nonce
    #     is the correct long-term fix; acceptable for now given no external scripts)
    #   - style-src 'self' 'unsafe-inline' → Tailwind emits inline styles
    #   - img-src 'self' data:          → base64 data URIs used by Three.js textures
    #   - connect-src 'self'            → API calls are same-origin via nginx proxy
    #   - worker-src blob:              → Three.js spins up a blob-URL worker
    #   - frame-ancestors 'none'        → belt-and-suspenders with X-Frame-Options
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; worker-src blob:; frame-ancestors 'none';" always;

    # --- API proxy ----------------------------------------------------------
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Overwrite X-Forwarded-For with the direct client IP so backend
        # rate limiting cannot be bypassed by a forged header from the client.
        proxy_set_header X-Forwarded-For $remote_addr;
        # SSE support for the live apply stream.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # --- SPA fallback -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
