name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations (sqlite)
        working-directory: backend
        env:
          DATABASE_URL: sqlite:////tmp/ci.db
        run: alembic upgrade head
      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install pip-audit bandit
      - name: Dependency vulnerability scan (pip-audit)
        working-directory: backend
        # Fails the build if any dependency has a known CVE.
        # Suppressed transitive CVEs that can't be fixed by bumping requirements.txt
        # directly. Each suppression must have a GitHub issue tracking the upstream fix.
        #
        # PYSEC-2025-185  python-jose — no upstream fix yet; tracked for auth library replacement
        # PYSEC-2026-161  starlette   — transitive from FastAPI; fix pending FastAPI upgrade
        # GHSA-2c2j-9gv5-cj73 starlette — same upstream constraint
        # GHSA-pq67-6m6q-mj2v urllib3  — transitive via httpx; urllib3 2.x is a breaking change
        # GHSA-gm62-xv2j-4w53 urllib3  — same
        # GHSA-2xpw-w6gg-jr37 urllib3  — same
        # GHSA-38jv-5279-wg99 urllib3  — same
        # PYSEC-2026-141   urllib3  — same
        # GHSA-537c-gmf6-5ccf cryptography — fix in 48.x; verifying compat before bump
        # GHSA-r6ph-v2qm-q3c2 cryptography — fix in 46.x; tracking
        # GHSA-gc5v-m9x4-r6x2 requests   — transitive; requests 2.33.0 compat check pending
        run: |
          pip-audit -r requirements.txt --progress-spinner off \
            --ignore-vuln PYSEC-2025-185 \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln GHSA-2c2j-9gv5-cj73 \
            --ignore-vuln GHSA-pq67-6m6q-mj2v \
            --ignore-vuln GHSA-gm62-xv2j-4w53 \
            --ignore-vuln GHSA-2xpw-w6gg-jr37 \
            --ignore-vuln GHSA-38jv-5279-wg99 \
            --ignore-vuln PYSEC-2026-141 \
            --ignore-vuln GHSA-537c-gmf6-5ccf \
            --ignore-vuln GHSA-r6ph-v2qm-q3c2 \
            --ignore-vuln GHSA-gc5v-m9x4-r6x2
      - name: Static security analysis (bandit)
        working-directory: backend
        # -ll = medium severity and above; -ii = medium confidence and above.
        # -x tests/ = skip test files (test helpers intentionally exercise edge cases).
        # Exit 0 on LOW findings only; non-zero on MEDIUM/HIGH → build fails.
        run: bandit -r app/ -ll -ii -x app/tests/ --format txt
        continue-on-error: false

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build --build-arg INSTALL_BROWSERS=0 -t jobara-api ./backend
      - name: Build web image
        run: docker build -t jobara-web ./frontend
