# Jobara — full production-shaped stack: Postgres + Redis + FastAPI + web.
# Local: `docker compose up --build` → web on http://localhost:8080, api on :8000.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobara}
      POSTGRES_DB: ${POSTGRES_DB:-jobara}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobara}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-jobara}:${POSTGRES_PASSWORD:-jobara}@db:5432/${POSTGRES_DB:-jobara}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    restart: unless-stopped

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
